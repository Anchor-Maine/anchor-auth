name: Security Review
# Runs Anthropic's AI security review on every PR to main; a human then reviews
# the findings and approves the merge. This is a required check — see SECURITY.md
# in the Anchor-Maine org policy.
on:
  pull_request:
    branches: [main]
permissions:
  contents: read        # never contents: write
  pull-requests: write  # never pull-requests: admin
jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Block merge on security findings
        if: steps.review.outputs.findings-count != '' && steps.review.outputs.findings-count != '0'
        run: |
          echo "::error::Security review reported ${{ steps.review.outputs.findings-count }} finding(s). Resolve or dismiss before merging."
          exit 1
